<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Set the text encoding so characters display correctly. -->
    <meta charset="UTF-8" />

    <!-- Make the layout scale correctly on phones and tablets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Set the browser tab title. -->
    <title>Notion Visual Timer</title>

    <style>
      /* Define reusable color variables for the whole widget. */
      :root {
        --face: #f8f8f6;
        --wedge: #d94b4b;
        --text: #1f2937;
        --tick: #6b7280;
        --button: #111827;
        --button-soft: rgba(17, 24, 39, 0.08);
      }

      /* Make width and height calculations include padding and borders. */
      * {
        box-sizing: border-box;
      }

      /* Center the timer on the page and keep the page background transparent. */
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        overflow: hidden;
      }

      /* Main outer wrapper for the whole timer widget. */
      .card {
        position: relative;
        width: min(100vw, 420px);
        background: transparent;
        padding: 12px 8px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      /* Wrapper for the circular clock area. */
      .timer-wrap {
        position: relative;
        z-index: 1;
        width: min(100%, 420px);
        aspect-ratio: 1 / 1;
        user-select: none;
        touch-action: none;
      }

      /* Make the SVG fill the available clock area. */
      svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
        cursor: grab;
      }

      /* Change the cursor while dragging the timer. */
      svg.dragging {
        cursor: grabbing;
      }

      /* Style for the digital time text below the clock. */
      .time {
        font-size: clamp(32px, 9vw, 42px);
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
      }

      /* Row that holds the minus button, time text, and plus button. */
      .controls {
        width: min(100%, 420px);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(12px, 4vw, 20px);
      }

      /* Shared base styles for the small round buttons and mode buttons. */
      .adjust-button,
      .mode-button {
        border: 0;
        border-radius: 999px;
        background: var(--button-soft);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      /* Style for the minus and plus time adjustment buttons. */
      .adjust-button {
        width: clamp(42px, 12vw, 48px);
        height: clamp(42px, 12vw, 48px);
        font-size: clamp(24px, 6vw, 28px);
        line-height: 1;
        padding: 0;
      }

      /* Fade disabled adjust and play buttons to show they cannot be used. */
      .adjust-button:disabled,
      .play-button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* Style for the main play / pause button. */
      .play-button {
        width: clamp(48px, 14vw, 56px);
        height: clamp(48px, 14vw, 56px);
        border: 0;
        border-radius: 999px;
        background: var(--button);
        color: white;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      /* Put the play / pause button exactly in the center of the clock. */
      .play-button-center {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 4;
      }

      /* Make the icon inside the play button use the same cursor. */
      .play-button svg {
        cursor: inherit;
      }

      /* Row for the timer-length mode buttons. */
      .mode-row {
        width: min(100%, 420px);
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      /* Style for each timer-length mode button. */
      .mode-button {
        min-width: 74px;
        height: 36px;
        padding: 0 14px;
        font-size: 14px;
        font-weight: 600;
      }

      /* Highlight the currently active timer-length mode. */
      .mode-button.active {
        background: var(--button);
        color: white;
      }

      /* Layer that holds the confetti animation above the clock. */
      .confetti-layer {
        position: absolute;
        left: 50%;
        top: 12px;
        width: min(100%, 420px);
        height: min(100%, 420px);
        transform: translateX(-50%);
        pointer-events: none;
        overflow: hidden;
        z-index: 2;
      }

      /* Style for each single confetti piece. */
      .confetti-piece {
        position: absolute;
        top: -18%;
        width: 5px;
        height: 8px;
        border-radius: 999px;
        opacity: 0.95;
        animation: confetti-fall linear forwards;
        will-change: transform, opacity;
      }

      /* Animation that makes confetti fall and rotate. */
      @keyframes confetti-fall {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg);
          opacity: 0;
        }
        8% {
          opacity: 0.95;
        }
        100% {
          transform: translate3d(var(--drift-x), var(--fall-distance), 0) rotate(var(--rotate));
          opacity: 0;
        }
      }

      /* Make SVG text use the same font as the rest of the widget. */
      text {
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <!-- Main widget container. -->
    <div class="card">
      <!-- Circular timer area. -->
      <div class="timer-wrap">
        <!-- SVG clock face, ticks, and colored wedge are drawn here with JavaScript. -->
        <svg id="timerSvg" viewBox="0 0 320 320" aria-label="Visual timer" preserveAspectRatio="xMidYMid meet"></svg>

        <!-- Center play / pause button. -->
        <button id="toggleButton" class="play-button play-button-center" aria-label="Start timer" type="button"></button>
      </div>

      <!-- Time controls row. -->
      <div class="controls">
        <!-- Button to reduce the current timer value. -->
        <button id="minusButton" class="adjust-button" aria-label="Subtract time" type="button">−</button>

        <!-- Digital time display. -->
        <div id="timeDisplay" class="time">60:00</div>

        <!-- Button to increase the current timer value. -->
        <button id="plusButton" class="adjust-button" aria-label="Add time" type="button">+</button>
      </div>

      <!-- Buttons for switching between 60, 30, and 10 minute modes. -->
      <div class="mode-row" aria-label="Timer length presets">
        <button class="mode-button active" data-mode="60" type="button">60 min</button>
        <button class="mode-button" data-mode="30" type="button">30 min</button>
        <button class="mode-button" data-mode="10" type="button">10 min</button>
      </div>

      <!-- Empty layer where confetti is added when time is up. -->
      <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>
    </div>

    <script>
      // SVG width and height used for drawing the clock.
      const SIZE = 320;

      // Center point of the SVG clock.
      const CENTER = SIZE / 2;

      // Radius of the circular timer face.
      const RADIUS = 112;

      // Colors used inside the SVG drawing.
      const WEDGE_COLOR = "#d94b4b";
      const FACE_COLOR = "#f8f8f6";
      const TEXT_COLOR = "#1f2937";
      const TICK_COLOR = "#6b7280";

      // Settings for each timer mode.
      const MODES = {
        60: { maxMinutes: 60, incrementMinutes: 5 },
        30: { maxMinutes: 30, incrementMinutes: 5 },
        10: { maxMinutes: 10, incrementMinutes: 1 },
      };

      // Get references to the main HTML elements we need to control.
      const svg = document.getElementById("timerSvg");
      const timeDisplay = document.getElementById("timeDisplay");
      const toggleButton = document.getElementById("toggleButton");
      const minusButton = document.getElementById("minusButton");
      const plusButton = document.getElementById("plusButton");
      const confettiLayer = document.getElementById("confettiLayer");

      // Collect all mode buttons into an array.
      const modeButtons = Array.from(document.querySelectorAll(".mode-button"));

      // Re-render the clock when the widget changes size.
      const resizeObserver = new ResizeObserver(() => render());

      // Current active timer mode.
      let currentMode = 60;

      // Remaining time stored in seconds.
      let remainingSeconds = 60 * 60;

      // Track whether the timer is currently counting down.
      let isRunning = false;

      // Track whether the user is dragging the clock.
      let isDragging = false;

      // Store the countdown interval ID so it can be stopped later.
      let intervalId = null;

      // Store the audio context used for the finish sound.
      let audioContext = null;

      // Prevent running the finish celebration more than once per countdown.
      let hasFinished = false;

      // Store the timeout used to clear confetti later.
      let confettiTimeoutId = null;

      // Return the settings object for the current mode.
      function getModeConfig() {
        return MODES[currentMode];
      }

      // Keep a number inside a min and max range.
      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      // Return the maximum minutes for the current mode.
      function getMaxMinutes() {
        return getModeConfig().maxMinutes;
      }

      // Return the minute step size for the current mode.
      function getIncrementMinutes() {
        return getModeConfig().incrementMinutes;
      }

      // Return the maximum seconds for the current mode.
      function getMaxSeconds() {
        return getMaxMinutes() * 60;
      }

      // Snap a minute value to the nearest allowed step for the current mode.
      function snapMinutes(minutes) {
        const increment = getIncrementMinutes();
        return clamp(Math.round(minutes / increment) * increment, 0, getMaxMinutes());
      }

      // Convert a circle position from angle and radius into x/y coordinates.
      function polarToCartesian(cx, cy, r, angleDeg) {
        const radians = ((angleDeg - 90) * Math.PI) / 180;
        return {
          x: cx + r * Math.cos(radians),
          y: cy + r * Math.sin(radians),
        };
      }

      // Convert remaining minutes into a starting angle for the red wedge.
      function angleFromMinutes(minutes) {
        const maxMinutes = getMaxMinutes();
        return (((maxMinutes - minutes) % maxMinutes) / maxMinutes) * 360;
      }

      // Convert pointer position on screen into an angle around the clock.
      function angleFromPointer(clientX, clientY, rect) {
        const x = clientX - rect.left - CENTER;
        const y = clientY - rect.top - CENTER;
        let deg = (Math.atan2(y, x) * 180) / Math.PI + 90;
        if (deg < 0) deg += 360;
        return deg;
      }

      // Convert a drag angle into a snapped minute value.
      function minutesFromAngle(angle) {
        const normalized = ((angle % 360) + 360) % 360;
        const maxMinutes = getMaxMinutes();
        if (normalized === 0) return maxMinutes;
        const rawMinutes = maxMinutes - (normalized / 360) * maxMinutes;
        return snapMinutes(rawMinutes);
      }

      // Build the SVG path string for the remaining-time wedge.
      function describeWedge(minutes) {
        const maxMinutes = getMaxMinutes();

        // Show nothing when time is zero.
        if (minutes <= 0) return "";

        // Special case: draw a full circle when the timer is at max.
        if (minutes >= maxMinutes) {
          return `M ${CENTER} ${CENTER - RADIUS} A ${RADIUS} ${RADIUS} 0 1 1 ${CENTER - 0.01} ${CENTER - RADIUS} Z`;
        }

        // Find the wedge start point on the edge of the circle.
        const startAngle = angleFromMinutes(minutes);
        const start = polarToCartesian(CENTER, CENTER, RADIUS, startAngle);

        // Always end the wedge at the top of the clock.
        const end = polarToCartesian(CENTER, CENTER, RADIUS, 0);

        // Tell SVG whether the arc is bigger than half a circle.
        const largeArcFlag = minutes > maxMinutes / 2 ? 1 : 0;

        // Draw from center to edge, around the arc, and back to center.
        return [
          `M ${CENTER} ${CENTER}`,
          `L ${start.x} ${start.y}`,
          `A ${RADIUS} ${RADIUS} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`,
          "Z",
        ].join(" ");
      }

      // Format seconds as minutes:seconds for the digital display.
      function formatTime(totalSeconds) {
        const safeSeconds = Math.max(0, totalSeconds);
        const mins = Math.floor(safeSeconds / 60);
        const secs = safeSeconds % 60;
        return `${mins}:${String(secs).padStart(2, "0")}`;
      }

      // Return the SVG markup for the play icon.
      function playIcon() {
        return `
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.86a1 1 0 0 0 0-1.72l-10-6.86A1 1 0 0 0 8 5.14z"></path>
          </svg>
        `;
      }

      // Return the SVG markup for the pause icon.
      function pauseIcon() {
        return `
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="6" y="5" width="4" height="14" rx="1"></rect>
            <rect x="14" y="5" width="4" height="14" rx="1"></rect>
          </svg>
        `;
      }

      // Make sure an audio context exists and is active before playing sounds.
      function ensureAudioContext() {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) audioContext = new AudioContextClass();
        }
        if (audioContext && audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }
      }

      // Play a short three-note sound when the timer ends.
      function playTimeUpSound() {
        ensureAudioContext();
        if (!audioContext) return;

        const now = audioContext.currentTime;

        // Play three tones one after another.
        [880, 1174.66, 1567.98].forEach((frequency, index) => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const start = now + index * 0.16;
          const end = start + 0.22;

          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(frequency, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.18, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, end);

          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start(start);
          oscillator.stop(end);
        });
      }

      // Remove all confetti elements and cancel any pending confetti cleanup timeout.
      function clearConfetti() {
        confettiLayer.innerHTML = "";
        if (confettiTimeoutId !== null) {
          clearTimeout(confettiTimeoutId);
          confettiTimeoutId = null;
        }
      }

      // Create and drop a lot of confetti pieces across the clock area.
      function launchConfetti() {
        clearConfetti();

        // Colors used by the confetti.
        const colors = ["#d94b4b", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899"];

        // Total number of confetti pieces to create.
        const pieceCount = 420;

        // Use the current confetti layer size, or fallback values if needed.
        const containerHeight = confettiLayer.clientHeight || 160;
        const containerWidth = confettiLayer.clientWidth || 320;

        // Create each confetti piece one by one.
        for (let i = 0; i < pieceCount; i += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti-piece";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.top = `${-22 - Math.random() * 18}%`;
          piece.style.background = colors[i % colors.length];
          piece.style.setProperty("--drift-x", `${(Math.random() - 0.5) * (containerWidth * 0.25)}px`);
          piece.style.setProperty("--rotate", `${(Math.random() * 720 - 360).toFixed(0)}deg`);
          piece.style.setProperty("--fall-distance", `${containerHeight + 110 + Math.random() * 90}px`);
          piece.style.animationDuration = `${(4.8 + Math.random() * 2.2).toFixed(2)}s`;
          piece.style.animationDelay = `-${(Math.random() * 3.5).toFixed(2)}s`;
          confettiLayer.appendChild(piece);
        }

        // Remove confetti after the animation has had enough time to finish.
        confettiTimeoutId = window.setTimeout(() => clearConfetti(), 7600);
      }

      // Run all finish effects together.
      function celebrateTimeUp() {
        playTimeUpSound();
        launchConfetti();
      }

      // Stop the countdown interval if one is running.
      function stopInterval() {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      // Start the once-per-second countdown.
      function startInterval() {
        stopInterval();

        intervalId = setInterval(() => {
          // If the timer is already at zero, stop and celebrate once.
          if (remainingSeconds <= 0) {
            remainingSeconds = 0;
            isRunning = false;
            stopInterval();
            if (!hasFinished) {
              hasFinished = true;
              celebrateTimeUp();
            }
            render();
            return;
          }

          // Remove one second each tick.
          remainingSeconds -= 1;

          // If we just reached zero, stop and celebrate once.
          if (remainingSeconds <= 0) {
            remainingSeconds = 0;
            isRunning = false;
            stopInterval();
            if (!hasFinished) {
              hasFinished = true;
              celebrateTimeUp();
            }
          }

          // Redraw the timer after each second.
          render();
        }, 1000);
      }

      // Start or stop the timer.
      function setRunning(next) {
        ensureAudioContext();
        isRunning = next;

        // Reset the finish flag when a fresh countdown starts.
        if (next && remainingSeconds > 0) {
          hasFinished = false;
        }

        // Start the interval only when the timer should be running and has time left.
        if (isRunning && remainingSeconds > 0) {
          startInterval();
        } else {
          stopInterval();
        }

        // Update the UI after the state change.
        render();
      }

      // Switch to a different timer mode and reset to that mode's full time.
      function setMode(nextMode) {
        currentMode = nextMode;
        hasFinished = false;
        clearConfetti();
        setRunning(false);
        remainingSeconds = getMaxSeconds();
        render();
      }

      // Add or subtract time in the current mode's step size.
      function adjustMinutes(delta) {
        hasFinished = false;
        clearConfetti();
        setRunning(false);
        const nextMinutes = snapMinutes(Math.round(remainingSeconds / 60) + delta);
        remainingSeconds = nextMinutes * 60;
        render();
      }

      // Update the timer by converting pointer position on the clock into minutes.
      function updateFromPointer(clientX, clientY) {
        hasFinished = false;
        clearConfetti();
        const rect = svg.getBoundingClientRect();
        const angle = angleFromPointer(clientX, clientY, rect);
        const snappedMinutes = minutesFromAngle(angle);
        remainingSeconds = snappedMinutes * 60;
        render();
      }

      // Build the list of minute values used for tick labels around the clock.
      function getTickValues() {
        const maxMinutes = getMaxMinutes();
        const increment = getIncrementMinutes();
        const values = [];

        for (let minuteValue = 0; minuteValue < maxMinutes; minuteValue += increment) {
          values.push(minuteValue);
        }

        return values;
      }

      // Draw the whole timer UI based on the current state.
      function render() {
        const svgRect = svg.getBoundingClientRect();
        const scale = svgRect.width ? svgRect.width / SIZE : 1;
        const majorTickWidth = (2.5 / Math.max(scale, 0.001)).toFixed(3);
        const labelFontSize = (11 / Math.max(scale, 0.001)).toFixed(3);
        const remainingMinutes = remainingSeconds / 60;
        const maxMinutes = getMaxMinutes();
        const wedgePath = describeWedge(remainingMinutes);

        // Build all clock ticks and labels as SVG markup.
        const ticksMarkup = getTickValues().map((minuteValue) => {
          const angle = (minuteValue / maxMinutes) * 360;
          const outer = polarToCartesian(CENTER, CENTER, RADIUS + 26, angle);
          const inner = polarToCartesian(CENTER, CENTER, RADIUS + 8, angle);
          const labelPoint = polarToCartesian(CENTER, CENTER, RADIUS + 40, angle);
          const labelValue = minuteValue === 0 ? "0" : String(maxMinutes - minuteValue);

          return `
            <g>
              <line
                x1="${inner.x}"
                y1="${inner.y}"
                x2="${outer.x}"
                y2="${outer.y}"
                stroke="${TICK_COLOR}"
                stroke-width="${majorTickWidth}"
                stroke-linecap="round"
                opacity="0.9"
              ></line>
              <text
                x="${labelPoint.x}"
                y="${labelPoint.y}"
                text-anchor="middle"
                dominant-baseline="central"
                font-size="${labelFontSize}"
                font-weight="500"
                fill="${TEXT_COLOR}"
              >${labelValue}</text>
            </g>
          `;
        }).join("");

        // Replace the clock SVG content with the latest drawing.
        svg.innerHTML = `
          ${ticksMarkup}
          <circle cx="${CENTER}" cy="${CENTER}" r="${RADIUS}" fill="${FACE_COLOR}"></circle>
          ${wedgePath ? `<path d="${wedgePath}" fill="${WEDGE_COLOR}"></path>` : ""}
        `;

        // Update the digital time text.
        timeDisplay.textContent = formatTime(remainingSeconds);

        // Swap the play button icon depending on timer state.
        toggleButton.innerHTML = isRunning ? pauseIcon() : playIcon();

        // Disable controls when they should not be used.
        toggleButton.disabled = remainingSeconds <= 0;
        minusButton.disabled = isRunning || remainingSeconds <= 0;
        plusButton.disabled = isRunning || remainingSeconds >= getMaxSeconds();

        // Keep the button label correct for screen readers.
        toggleButton.setAttribute("aria-label", isRunning ? "Pause timer" : "Start timer");

        // Change the SVG cursor while dragging.
        svg.classList.toggle("dragging", isDragging);

        // Highlight the currently selected mode button.
        modeButtons.forEach((button) => {
          const isActive = Number(button.dataset.mode) === currentMode;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
      }

      // Start dragging when the user presses down on the clock.
      svg.addEventListener("pointerdown", (event) => {
        isDragging = true;
        setRunning(false);
        svg.setPointerCapture(event.pointerId);
        updateFromPointer(event.clientX, event.clientY);
      });

      // Keep updating the timer while the user drags.
      svg.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        updateFromPointer(event.clientX, event.clientY);
      });

      // Stop dragging when the user releases the pointer.
      svg.addEventListener("pointerup", (event) => {
        isDragging = false;
        if (svg.hasPointerCapture(event.pointerId)) {
          svg.releasePointerCapture(event.pointerId);
        }
        render();
      });

      // Also stop dragging if the pointer interaction gets cancelled.
      svg.addEventListener("pointercancel", (event) => {
        isDragging = false;
        if (svg.hasPointerCapture(event.pointerId)) {
          svg.releasePointerCapture(event.pointerId);
        }
        render();
      });

      // Start or pause the timer when the center button is clicked.
      toggleButton.addEventListener("click", () => {
        ensureAudioContext();
        if (remainingSeconds <= 0) return;
        setRunning(!isRunning);
      });

      // Decrease time by one mode step when minus is clicked.
      minusButton.addEventListener("click", () => {
        adjustMinutes(-getIncrementMinutes());
      });

      // Increase time by one mode step when plus is clicked.
      plusButton.addEventListener("click", () => {
        adjustMinutes(getIncrementMinutes());
      });

      // Change timer mode when a mode button is clicked.
      modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const nextMode = Number(button.dataset.mode);
          if (nextMode !== currentMode) {
            setMode(nextMode);
          }
        });
      });

      // Unlock audio after the first keyboard interaction.
      window.addEventListener("keydown", () => ensureAudioContext(), { once: true });

      // Unlock audio after the first pointer interaction.
      window.addEventListener("pointerdown", () => ensureAudioContext(), { once: true });

      // Re-render if the widget changes size.
      resizeObserver.observe(document.querySelector(".card"));

      // Draw the initial UI immediately when the page loads.
      render();
    </script>
  </body>
</html>
