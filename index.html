<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notion Visual Timer</title>
    <style>
      :root {
        --face: #f8f8f6;
        --wedge: #d94b4b;
        --text: #1f2937;
        --tick: #6b7280;
        --button: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
      }

      .card {
        width: min(100vw, 420px);
        background: transparent;
        border-radius: 0;
        box-shadow: none;
        padding: 12px 8px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .timer-wrap {
        width: min(100%, 420px);
        aspect-ratio: 1 / 1;
        user-select: none;
        touch-action: none;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
        cursor: grab;
      }

      svg.dragging {
        cursor: grabbing;
      }

      .time {
        font-size: clamp(32px, 9vw, 42px);
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
      }

      .play-button {
        width: clamp(48px, 14vw, 56px);
        height: clamp(48px, 14vw, 56px);
        border: 0;
        border-radius: 999px;
        background: var(--button);
        color: white;
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: none;
      }

      .play-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .play-button svg {
        cursor: inherit;
      }

      .confetti-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .confetti-piece {
        position: absolute;
        top: -12%;
        width: 10px;
        height: 18px;
        border-radius: 999px;
        opacity: 0.9;
        animation: confetti-fall linear forwards;
        will-change: transform, opacity;
      }

      @keyframes confetti-fall {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg);
          opacity: 0;
        }
        8% {
          opacity: 0.95;
        }
        100% {
          transform: translate3d(var(--drift-x), 118vh, 0) rotate(var(--rotate));
          opacity: 0;
        }
      }

      text {
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="timer-wrap">
        <svg id="timerSvg" viewBox="0 0 320 320" aria-label="Visual timer" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div id="timeDisplay" class="time">25:00</div>
      <button id="toggleButton" class="play-button" aria-label="Start timer" type="button"></button>
    </div>
    <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>

    <script>
      const MAX_MINUTES = 60;
      const SIZE = 320;
      const CENTER = SIZE / 2;
      const RADIUS = 112;
      const WEDGE_COLOR = "#d94b4b";
      const FACE_COLOR = "#f8f8f6";
      const TEXT_COLOR = "#1f2937";
      const TICK_COLOR = "#6b7280";

      const svg = document.getElementById("timerSvg");
      document.body.style.overflow = "hidden";
      const resizeObserver = new ResizeObserver(() => render());
      const timeDisplay = document.getElementById("timeDisplay");
      const toggleButton = document.getElementById("toggleButton");
      const confettiLayer = document.getElementById("confettiLayer");

      let remainingSeconds = 25 * 60;
      let isRunning = false;
      let isDragging = false;
      let intervalId = null;
      let audioContext = null;
      let hasFinished = false;
      let confettiTimeoutId = null;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function polarToCartesian(cx, cy, r, angleDeg) {
        const radians = ((angleDeg - 90) * Math.PI) / 180;
        return {
          x: cx + r * Math.cos(radians),
          y: cy + r * Math.sin(radians),
        };
      }

      function angleFromMinutes(minutes) {
        return (((MAX_MINUTES - minutes) % MAX_MINUTES) / MAX_MINUTES) * 360;
      }

      function angleFromPointer(clientX, clientY, rect) {
        const x = clientX - rect.left - CENTER;
        const y = clientY - rect.top - CENTER;
        let deg = (Math.atan2(y, x) * 180) / Math.PI + 90;
        if (deg < 0) deg += 360;
        return deg;
      }

      function minutesFromAngle(angle) {
        const normalized = ((angle % 360) + 360) % 360;
        if (normalized === 0) return MAX_MINUTES;
        return clamp(MAX_MINUTES - Math.round((normalized / 360) * MAX_MINUTES), 0, MAX_MINUTES);
      }

      function describeWedge(minutes) {
        if (minutes <= 0) return "";
        if (minutes >= MAX_MINUTES) {
          return `M ${CENTER} ${CENTER - RADIUS} A ${RADIUS} ${RADIUS} 0 1 1 ${CENTER - 0.01} ${CENTER - RADIUS} Z`;
        }

        const startAngle = angleFromMinutes(minutes);
        const endAngle = 0;
        const start = polarToCartesian(CENTER, CENTER, RADIUS, startAngle);
        const end = polarToCartesian(CENTER, CENTER, RADIUS, endAngle);
        const largeArcFlag = minutes > MAX_MINUTES / 2 ? 1 : 0;

        return [
          `M ${CENTER} ${CENTER}`,
          `L ${start.x} ${start.y}`,
          `A ${RADIUS} ${RADIUS} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`,
          "Z",
        ].join(" ");
      }

      function formatTime(totalSeconds) {
        const safeSeconds = Math.max(0, totalSeconds);
        const mins = Math.floor(safeSeconds / 60);
        const secs = safeSeconds % 60;
        return `${mins}:${String(secs).padStart(2, "0")}`;
      }

      function playIcon() {
        return `
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 5.14v13.72a1 1 0 0 0 1.5.86l10-6.86a1 1 0 0 0 0-1.72l-10-6.86A1 1 0 0 0 8 5.14z"></path>
          </svg>
        `;
      }

      function pauseIcon() {
        return `
          <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="6" y="5" width="4" height="14" rx="1"></rect>
            <rect x="14" y="5" width="4" height="14" rx="1"></rect>
          </svg>
        `;
      }

      function ensureAudioContext() {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) {
            audioContext = new AudioContextClass();
          }
        }
        if (audioContext && audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }
      }

      function playTimeUpSound() {
        ensureAudioContext();
        if (!audioContext) return;

        const now = audioContext.currentTime;
        const notes = [880, 1174.66, 1567.98];

        notes.forEach((frequency, index) => {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const start = now + index * 0.16;
          const end = start + 0.22;

          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(frequency, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.18, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, end);

          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start(start);
          oscillator.stop(end);
        });
      }

      function clearConfetti() {
        confettiLayer.innerHTML = "";
        if (confettiTimeoutId !== null) {
          clearTimeout(confettiTimeoutId);
          confettiTimeoutId = null;
        }
      }

      function launchConfetti() {
        clearConfetti();
        const colors = ["#d94b4b", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899"];
        const pieceCount = 90;

        for (let i = 0; i < pieceCount; i += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti-piece";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = colors[i % colors.length];
          piece.style.setProperty("--drift-x", `${(Math.random() - 0.5) * 240}px`);
          piece.style.setProperty("--rotate", `${(Math.random() * 1080 - 540).toFixed(0)}deg`);
          piece.style.animationDuration = `${(2.8 + Math.random() * 1.8).toFixed(2)}s`;
          piece.style.animationDelay = `${(Math.random() * 0.35).toFixed(2)}s`;
          confettiLayer.appendChild(piece);
        }

        confettiTimeoutId = window.setTimeout(() => {
          clearConfetti();
        }, 5200);
      }

      function celebrateTimeUp() {
        playTimeUpSound();
        launchConfetti();
      }

      function stopInterval() {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      function startInterval() {
        stopInterval();
        intervalId = setInterval(() => {
          if (remainingSeconds <= 0) {
            remainingSeconds = 0;
            isRunning = false;
            stopInterval();
            if (!hasFinished) {
              hasFinished = true;
              celebrateTimeUp();
            }
            render();
            return;
          }
          remainingSeconds -= 1;
          if (remainingSeconds <= 0) {
            remainingSeconds = 0;
            isRunning = false;
            stopInterval();
            if (!hasFinished) {
              hasFinished = true;
              celebrateTimeUp();
            }
          }
          render();
        }, 1000);
      }

      function setRunning(next) {
        ensureAudioContext();
        isRunning = next;
        if (next && remainingSeconds > 0) {
          hasFinished = false;
        }
        if (isRunning && remainingSeconds > 0) {
          startInterval();
        } else {
          stopInterval();
        }
        render();
      }

      function updateFromPointer(clientX, clientY) {
        hasFinished = false;
        clearConfetti();
        const rect = svg.getBoundingClientRect();
        const angle = angleFromPointer(clientX, clientY, rect);
        const snappedMinutes = minutesFromAngle(angle);
        remainingSeconds = snappedMinutes * 60;
        render();
      }

      function render() {
        const svgRect = svg.getBoundingClientRect();
        const scale = svgRect.width ? svgRect.width / SIZE : 1;
        const majorTickWidth = (2.5 / Math.max(scale, 0.001)).toFixed(3);
        const minorTickWidth = (1.2 / Math.max(scale, 0.001)).toFixed(3);
        const handleStrokeWidth = (3 / Math.max(scale, 0.001)).toFixed(3);
        const labelFontSize = (11 / Math.max(scale, 0.001)).toFixed(3);
        const handleRadius = (9 / Math.max(scale, 0.001)).toFixed(3);
        const remainingMinutes = remainingSeconds / 60;
        const wedgePath = describeWedge(remainingMinutes);
        const handleAngle = angleFromMinutes(remainingMinutes);
        const handle = polarToCartesian(CENTER, CENTER, RADIUS, handleAngle);

        const ticksMarkup = Array.from({ length: 60 }, (_, i) => {
          const angle = (i / 60) * 360;
          const isMajor = i % 5 === 0;
          const outer = polarToCartesian(CENTER, CENTER, RADIUS + 26, angle);
          const inner = polarToCartesian(CENTER, CENTER, RADIUS + (isMajor ? 8 : 18), angle);
          const labelPoint = polarToCartesian(CENTER, CENTER, RADIUS + 40, angle);
          const labelValue = i === 0 ? "0" : String(60 - i);

          return `
            <g>
              <line
                x1="${inner.x}"
                y1="${inner.y}"
                x2="${outer.x}"
                y2="${outer.y}"
                stroke="${TICK_COLOR}"
                stroke-width="${isMajor ? majorTickWidth : minorTickWidth}"
                stroke-linecap="round"
                opacity="${isMajor ? 0.9 : 0.45}"
              ></line>
              ${isMajor ? `
                <text
                  x="${labelPoint.x}"
                  y="${labelPoint.y}"
                  text-anchor="middle"
                  dominant-baseline="central"
                  font-size="${labelFontSize}"
                  font-weight="500"
                  fill="${TEXT_COLOR}"
                >${labelValue}</text>
              ` : ""}
            </g>
          `;
        }).join("");

        svg.innerHTML = `
          ${ticksMarkup}
          <circle cx="${CENTER}" cy="${CENTER}" r="${RADIUS}" fill="${FACE_COLOR}"></circle>
          ${wedgePath ? `<path d="${wedgePath}" fill="${WEDGE_COLOR}"></path>` : ""}
          ${remainingSeconds > 0 ? `
            <circle
              cx="${handle.x}"
              cy="${handle.y}"
              r="${handleRadius}"
              fill="white"
              stroke="${WEDGE_COLOR}"
              stroke-width="${handleStrokeWidth}"
            ></circle>
          ` : ""}
        `;

        timeDisplay.textContent = formatTime(remainingSeconds);
        toggleButton.innerHTML = isRunning ? pauseIcon() : playIcon();
        toggleButton.disabled = remainingSeconds <= 0;
        toggleButton.setAttribute("aria-label", isRunning ? "Pause timer" : "Start timer");
        svg.classList.toggle("dragging", isDragging);
      }

      svg.addEventListener("pointerdown", (event) => {
        isDragging = true;
        setRunning(false);
        svg.setPointerCapture(event.pointerId);
        updateFromPointer(event.clientX, event.clientY);
      });

      svg.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        updateFromPointer(event.clientX, event.clientY);
      });

      svg.addEventListener("pointerup", (event) => {
        isDragging = false;
        if (svg.hasPointerCapture(event.pointerId)) {
          svg.releasePointerCapture(event.pointerId);
        }
        render();
      });

      svg.addEventListener("pointercancel", (event) => {
        isDragging = false;
        if (svg.hasPointerCapture(event.pointerId)) {
          svg.releasePointerCapture(event.pointerId);
        }
        render();
      });

      toggleButton.addEventListener("click", () => {
        ensureAudioContext();
        if (remainingSeconds <= 0) return;
        setRunning(!isRunning);
      });

      window.addEventListener("keydown", () => ensureAudioContext(), { once: true });
      window.addEventListener("pointerdown", () => ensureAudioContext(), { once: true });

      resizeObserver.observe(document.querySelector(".card"));
      render();
    </script>
  </body>
</html>
